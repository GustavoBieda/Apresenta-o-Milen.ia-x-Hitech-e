<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head>
<body class="dark-bg" style="padding:0">
<div style="padding:22px 24px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px">
  <div class="card" style="background:hsl(240 8% 7%);border-color:hsl(240 6% 18%);color:#fff">
    <div style="font-weight:600;font-size:13px">Card</div>
    <div style="font-size:12px;color:#9aa;margin-top:4px">shadcn · border + bg-card</div>
  </div>
  <div class="glass-card" style="padding:16px;color:#fff;background:rgba(255,255,255,.04);backdrop-filter:blur(12px)">
    <div style="font-weight:600;font-size:13px">Glass</div>
    <div style="font-size:12px;color:#bbc;margin-top:4px">backdrop-blur · subtle</div>
  </div>
  <div class="gradient-bg" style="padding:2px;border-radius:14px">
    <div style="background:hsl(240 8% 7%);border-radius:12px;padding:14px;color:#fff">
      <div style="font-weight:600;font-size:13px">Gradient border</div>
      <div style="font-size:12px;color:#9aa;margin-top:4px">pink → purple → cyan</div>
    </div>
  </div>
</div>
</body></html>
