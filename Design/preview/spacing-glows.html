<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="dark-bg" style="padding:0">
<div style="padding:26px 24px">
  <div class="label" style="margin-bottom:16px">Glow & shadow system</div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:22px;align-items:center">
    <div style="text-align:center"><div style="height:50px;width:50px;margin:6px auto;border-radius:999px;background:#FF0080;box-shadow:0 0 40px 0 rgba(255,0,128,.55),0 0 80px 0 rgba(255,0,128,.3)"></div><div class="mono" style="margin-top:12px;color:#9aa">agente-glow-pink</div></div>
    <div style="text-align:center"><div style="height:50px;width:50px;margin:6px auto;border-radius:999px;background:#00E6B8;box-shadow:0 0 40px 0 rgba(0,230,184,.55),0 0 80px 0 rgba(0,230,184,.25)"></div><div class="mono" style="margin-top:12px;color:#9aa">agente-glow-teal</div></div>
    <div style="text-align:center"><div style="height:50px;width:90px;margin:6px auto;border-radius:999px;background:#FF0080;box-shadow:0 10px 40px -10px rgba(255,0,128,.5)"></div><div class="mono" style="margin-top:12px;color:#9aa">shadow-primary</div></div>
  </div>
</div>
</body></html>
