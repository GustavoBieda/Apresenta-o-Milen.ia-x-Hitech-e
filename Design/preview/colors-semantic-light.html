<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div style="padding:22px 24px">
  <div class="label" style="margin-bottom:14px">Semantic tokens — light</div>
  <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px">
    <div><div style="height:56px;border-radius:10px;background:hsl(330 100% 50%)"></div><div style="margin-top:6px"><div style="font-size:12px;font-weight:600">primary</div><div class="mono" style="color:#6b7280">#FF0080</div></div></div>
    <div><div style="height:56px;border-radius:10px;background:hsl(220 70% 50%)"></div><div style="margin-top:6px"><div style="font-size:12px;font-weight:600">accent</div><div class="mono" style="color:#6b7280">#2C6FD9</div></div></div>
    <div><div style="height:56px;border-radius:10px;background:#fff;border:1px solid #e5e7eb"></div><div style="margin-top:6px"><div style="font-size:12px;font-weight:600">background</div><div class="mono" style="color:#6b7280">#FFFFFF</div></div></div>
    <div><div style="height:56px;border-radius:10px;background:hsl(240 5% 96%)"></div><div style="margin-top:6px"><div style="font-size:12px;font-weight:600">muted</div><div class="mono" style="color:#6b7280">#F4F4F5</div></div></div>
    <div><div style="height:56px;border-radius:10px;background:hsl(0 84% 60%)"></div><div style="margin-top:6px"><div style="font-size:12px;font-weight:600">destructive</div><div class="mono" style="color:#6b7280">#EF4444</div></div></div>
  </div>
</div>
</body></html>
