<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><link rel="stylesheet" href="_base.css"></head>
<body class="dark-bg" style="padding:0">
<div style="padding:20px 24px">
  <div class="label" style="margin-bottom:12px">Mila — chat bubbles</div>
  <div style="display:flex;flex-direction:column;gap:8px;max-width:520px">
    <div style="align-self:flex-start;background:hsl(240 6% 12%);color:#fff;padding:10px 14px;border-radius:18px 18px 18px 4px;font-size:13px">Oi! Sou a Mila. Como posso ajudar? 💜</div>
    <div style="align-self:flex-end;background:hsl(330 100% 55%);color:#fff;padding:10px 14px;border-radius:18px 18px 4px 18px;font-size:13px;box-shadow:0 8px 24px -10px rgba(255,0,128,.6)">Quero conhecer as soluções de IA.</div>
    <div style="align-self:flex-start;display:flex;gap:6px;padding:10px 14px;background:hsl(240 6% 12%);border-radius:18px;width:fit-content">
      <span style="width:6px;height:6px;border-radius:999px;background:#FF0080;animation:pulse-dot 1.4s ease-in-out infinite"></span>
      <span style="width:6px;height:6px;border-radius:999px;background:#FF0080;animation:pulse-dot 1.4s ease-in-out .2s infinite"></span>
      <span style="width:6px;height:6px;border-radius:999px;background:#FF0080;animation:pulse-dot 1.4s ease-in-out .4s infinite"></span>
    </div>
    <div style="display:flex;gap:6px;margin-top:4px">
      <button class="btn btn-outline btn-sm" style="color:#fff;border-color:hsl(240 6% 22%)">Atendimento 24h</button>
      <button class="btn btn-outline btn-sm" style="color:#fff;border-color:hsl(240 6% 22%)">Vendas com IA</button>
      <button class="btn btn-default btn-sm">Agendar com especialista</button>
    </div>
  </div>
</div>
</body></html>
