<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="dark-bg" style="padding:0">
<div style="padding:22px 24px">
  <div class="label" style="margin-bottom:14px">Hero gradient palette</div>
  <div style="height:74px;border-radius:14px;background:linear-gradient(110deg,#00E0FF 0%,#6B46C1 50%,#FF0099 100%);box-shadow:0 10px 40px -8px rgba(255,0,153,.35)"></div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:10px">
    <div style="display:flex;align-items:center;gap:10px"><div style="width:22px;height:22px;border-radius:6px;background:#00E0FF"></div><div><div style="font-size:12px;font-weight:600">hero-cyan</div><div class="mono" style="color:#9aa">#00E0FF</div></div></div>
    <div style="display:flex;align-items:center;gap:10px"><div style="width:22px;height:22px;border-radius:6px;background:#6B46C1"></div><div><div style="font-size:12px;font-weight:600">hero-purple</div><div class="mono" style="color:#9aa">#6B46C1</div></div></div>
    <div style="display:flex;align-items:center;gap:10px"><div style="width:22px;height:22px;border-radius:6px;background:#FF0099"></div><div><div style="font-size:12px;font-weight:600">hero-pink</div><div class="mono" style="color:#9aa">#FF0099</div></div></div>
  </div>
</div>
</body></html>
