<!doctype html><html class="dark"><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body class="dark-bg" style="padding:0">
<div style="padding:22px 24px">
  <div class="label" style="margin-bottom:14px">Radius — <span class="mono" style="color:#9aa;text-transform:none;letter-spacing:0">--radius: 0.75rem</span></div>
  <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">
    <div style="text-align:center"><div style="height:56px;background:linear-gradient(135deg,#FF0099,#6B46C1);border-radius:2px"></div><div class="mono" style="margin-top:6px;color:#9aa">sm · 2px</div></div>
    <div style="text-align:center"><div style="height:56px;background:linear-gradient(135deg,#FF0099,#6B46C1);border-radius:6px"></div><div class="mono" style="margin-top:6px;color:#9aa">md · 6px</div></div>
    <div style="text-align:center"><div style="height:56px;background:linear-gradient(135deg,#FF0099,#6B46C1);border-radius:8px"></div><div class="mono" style="margin-top:6px;color:#9aa">lg · 8px</div></div>
    <div style="text-align:center"><div style="height:56px;background:linear-gradient(135deg,#FF0099,#6B46C1);border-radius:12px"></div><div class="mono" style="margin-top:6px;color:#9aa">xl · 12px</div></div>
    <div style="text-align:center"><div style="height:56px;background:linear-gradient(135deg,#FF0099,#6B46C1);border-radius:20px"></div><div class="mono" style="margin-top:6px;color:#9aa">2xl · 20px</div></div>
    <div style="text-align:center"><div style="height:56px;background:linear-gradient(135deg,#FF0099,#6B46C1);border-radius:999px"></div><div class="mono" style="margin-top:6px;color:#9aa">full</div></div>
  </div>
</div>
</body></html>
